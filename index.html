<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1226" />
    <title>백층 던전 — 100층까지 내려가라!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 개발 검증용: 숨김 탭에서는 rAF가 멈춰 3D가 안 그려지므로 ?rafshim으로 우회 (배포에는 영향 없음)
      if (new URLSearchParams(location.search).has('rafshim')) {
        (function () {
          // 타이머 구동 rAF — 숨김 탭에서는 ~1fps로 클램프되지만 CPU를 점유하지 않아
          // 자동 검증(CDP)이 굶지 않는다. 보이는 탭에서는 심 없이 진짜 rAF를 쓰면 됨.
          var q = [];
          function pump() {
            var now = performance.now();
            var cbs = q;
            q = [];
            cbs.forEach(function (cb) {
              cb(now);
            });
            setTimeout(pump, 16);
          }
          setTimeout(pump, 16);
          window.requestAnimationFrame = function (cb) {
            q.push(cb);
            return q.length;
          };
          window.cancelAnimationFrame = function () {};

          // 숨김 탭에서는 ResizeObserver 알림도 오지 않아 r3f 캔버스가 부팅하지 못함 → 폴링 폴리필
          var RO = function (cb) {
            this._els = [];
            this._cb = cb;
            var self = this;
            this._iv = setInterval(function () {
              if (!self._els.length) return;
              var entries = self._els.map(function (el) {
                return { target: el, contentRect: el.getBoundingClientRect() };
              });
              self._cb(entries, self);
            }, 300);
          };
          RO.prototype.observe = function (el) {
            if (this._els.indexOf(el) < 0) this._els.push(el);
          };
          RO.prototype.unobserve = function (el) {
            var i = this._els.indexOf(el);
            if (i >= 0) this._els.splice(i, 1);
          };
          RO.prototype.disconnect = function () {
            this._els = [];
            clearInterval(this._iv);
          };
          window.ResizeObserver = RO;
        })();
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
