<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>백층 던전 — YouTube 썸네일 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
<style>
  body{margin:0;background:#0d0918;color:#e8e1ff;font-family:'Jua',sans-serif;display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px}
  h1{font-size:20px;color:#c9b4ff;margin:4px 0}
  p{margin:0;color:#9c8fc4;font-size:14px;text-align:center}
  canvas{max-width:100%;height:auto;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  button{font-family:inherit;font-size:18px;color:#fff;background:linear-gradient(180deg,#8f6bff,#6a3ee8);border:none;border-radius:14px;padding:12px 32px;cursor:pointer;box-shadow:0 5px 0 #4a2f8f}
  button:active{transform:translateY(3px);box-shadow:0 2px 0 #4a2f8f}
</style>
</head>
<body>
  <h1>백층 던전 — YouTube 썸네일 (1280×720)</h1>
  <p>아래 버튼을 누르면 <b>dungeon100-thumbnail.png</b> 파일이 다운로드됩니다.</p>
  <canvas id="c" width="1280" height="720"></canvas>
  <button id="dl">⬇️ PNG 다운로드</button>
<script>
function draw(){
  const cv=document.getElementById('c'), x=cv.getContext('2d'), W=1280,H=720;
  let g=x.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#241a44'); g.addColorStop(0.55,'#1a1030'); g.addColorStop(1,'#0d0918');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(143,107,255,0.12)'; x.lineWidth=2;
  for(let i=0;i<=14;i++){const yy=430+i*i*1.2; if(yy>H)break; x.beginPath(); x.moveTo(0,yy); x.lineTo(W,yy); x.stroke();}
  for(let i=-8;i<=8;i++){x.beginPath(); x.moveTo(W/2,430); x.lineTo(W/2+i*180,H); x.stroke();}
  for(let i=0;i<80;i++){x.fillStyle='rgba(255,255,255,'+(0.05+Math.random()*0.18)+')'; x.beginPath(); x.arc(Math.random()*W,Math.random()*430,1+Math.random()*2.2,0,7); x.fill();}
  function door(cx,cy,ans,correct){
    const dw=210,dh=300; x.save();
    let dg=x.createLinearGradient(cx-dw/2,cy-dh/2,cx-dw/2,cy+dh/2);
    dg.addColorStop(0,correct?'#a17cff':'#8f6bff'); dg.addColorStop(1,'#5b3bbd');
    x.fillStyle=dg; x.beginPath(); const r=dw/2;
    x.moveTo(cx-dw/2,cy+dh/2); x.lineTo(cx-dw/2,cy-dh/2+r); x.arc(cx,cy-dh/2+r,r,Math.PI,0);
    x.lineTo(cx+dw/2,cy+dh/2); x.closePath();
    if(correct){x.shadowColor='rgba(255,209,102,0.9)'; x.shadowBlur=40;} x.fill();
    x.shadowBlur=0; x.lineWidth=8; x.strokeStyle='#c9b4ff'; x.stroke();
    x.fillStyle='#ffd166'; x.beginPath(); x.arc(cx+dw/2-26,cy,10,0,7); x.fill();
    x.fillStyle='#fff'; x.font='92px Jua'; x.textAlign='center'; x.textBaseline='middle';
    x.shadowColor='rgba(0,0,0,0.4)'; x.shadowBlur=8; x.shadowOffsetY=4; x.fillText(''+ans,cx,cy+6); x.restore();
  }
  door(880,360,'54',false); door(1120,360,'56',true);
  x.save(); x.fillStyle='rgba(20,12,40,0.92)'; x.strokeStyle='#6a4fd0'; x.lineWidth=4;
  const bx=780,by=150,bw=440,bh=92; x.beginPath(); x.roundRect(bx,by,bw,bh,16); x.fill(); x.stroke();
  x.fillStyle='#ffd166'; x.font='58px Jua'; x.textAlign='center'; x.textBaseline='middle'; x.fillText('7 × 8 = ?',bx+bw/2,by+bh/2+2); x.restore();
  (function hero(hx,hy,s){ x.save(); x.translate(hx,hy); x.scale(s,s);
    x.shadowColor='rgba(0,0,0,0.5)'; x.shadowBlur=20; x.shadowOffsetY=14;
    x.fillStyle='#3a6ea5'; x.fillRect(-30,60,26,60); x.save(); x.translate(20,60); x.rotate(0.5); x.fillRect(-13,0,26,58); x.restore();
    x.shadowBlur=0; x.fillStyle='#5aa0ff'; x.fillRect(-45,-40,90,104);
    x.save(); x.translate(-45,-30); x.rotate(-0.6); x.fillStyle='#4f8fe0'; x.fillRect(-20,0,20,64); x.restore();
    x.save(); x.translate(45,-30); x.rotate(0.6); x.fillStyle='#4f8fe0'; x.fillRect(0,0,20,64); x.restore();
    x.fillStyle='#ffd9a8'; x.fillRect(-38,-120,76,80);
    x.fillStyle='#2a2333'; x.fillRect(-20,-92,12,16); x.fillRect(10,-92,12,16);
    x.fillStyle='rgba(255,140,160,0.5)'; x.beginPath(); x.arc(-26,-70,8,0,7); x.arc(26,-70,8,0,7); x.fill(); x.restore();
  })(330,430,1.15);
  x.textAlign='left'; x.textBaseline='alphabetic';
  x.font='150px Jua'; x.fillStyle='#c9b4ff'; x.shadowColor='#4a2f8f'; x.shadowOffsetY=8; x.fillText('백층 던전',70,180); x.shadowOffsetY=0;
  x.font='46px Jua'; x.fillStyle='#e8e1ff'; x.fillText('AI로 만든 3D 로그라이크',74,250);
  x.save(); x.translate(150,560); x.rotate(-0.08);
  x.fillStyle='#ffd166'; x.font='120px Jua'; x.textAlign='center'; x.shadowColor='rgba(0,0,0,0.5)'; x.shadowBlur=10; x.shadowOffsetY=6; x.fillText('100층',0,0);
  x.font='34px Jua'; x.fillStyle='#ffe9b3'; x.shadowBlur=0; x.fillText('까지 내려가라!',0,44); x.restore();
  x.fillStyle='rgba(13,9,24,0.72)'; x.fillRect(0,H-56,W,56);
  x.fillStyle='#b9aede'; x.font='30px Jua'; x.textAlign='left'; x.textBaseline='middle'; x.fillText('▶  hakhyun-kim.github.io/dungeon100',30,H-27);
  x.textAlign='right'; x.fillStyle='#8d7fc0'; x.fillText('NAN 2026 · NHN Game × AI Hackathon',W-30,H-27);
}
document.fonts.ready.then(draw); setTimeout(draw,600);
document.getElementById('dl').onclick=function(){draw(); const a=document.createElement('a'); a.download='dungeon100-thumbnail.png'; a.href=document.getElementById('c').toDataURL('image/png'); a.click();};
</script>
</body>
</html>
